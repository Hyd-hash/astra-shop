# All messages support MiniMessage tags and legacy '&' codes.
# {prefix} is replaced with the `prefix` value from config.yml.

no-permission: "{prefix}<red>You don't have permission to do that."
player-only: "{prefix}<red>Only players can use this command."
unknown-command: "{prefix}<red>Unknown subcommand. Try /astrashop reload"

no-vault: "{prefix}<red>Vault was not found or no economy plugin is hooked in. The shop is disabled."

shop-opened: "{prefix}<gray>Welcome to the <light_purple>Astra Shop<gray>!"
category-not-found: "{prefix}<red>That category no longer exists."

buy-success: "{prefix}<green>Bought <white>{amount}x {item} <green>for <gold>{price}<green>."
buy-fail-money: "{prefix}<red>You don't have enough money for that. You need <gold>{price}<red>."
buy-fail-inventory-full: "{prefix}<red>Your inventory is full."
buy-fail-generic: "{prefix}<red>That purchase could not be completed."

sell-success: "{prefix}<green>Sold <white>{amount}x {item} <green>for <gold>{price}<green>."
sell-fail-none: "{prefix}<red>You don't have any {item} to sell."
sell-fail-generic: "{prefix}<red>That sale could not be completed."

cooldown: "{prefix}<red>You're clicking too fast, slow down a little."

reload-success: "{prefix}<green>Configuration and shop data reloaded."
save-success: "{prefix}<green>Shop price data saved."
setprice-usage: "{prefix}<red>Usage: /astrashop setprice <categoryId> <itemId> <buy|sell> <amount>"
setprice-success: "{prefix}<green>Updated {type} price of {item} to <gold>{price}<green>."
resetprice-success: "{prefix}<green>Reset dynamic price of {item} back to base."
item-not-found: "{prefix}<red>Could not find that category/item combination."

# Item lore lines shown in shop GUIs. %newline% separators are handled internally.
lore:
  buy-price: "<gray>Buy: <green>{price} <gray>/ item"
  sell-price: "<gray>Sell: <light_purple>{price} <gray>/ item"
  buy-price-unavailable: "<gray>Buy: <dark_gray>Not for sale"
  sell-price-unavailable: "<gray>Sell: <dark_gray>Not buyable back"
  dynamic-tag: "<dark_gray>(market price)"
  fixed-tag: "<dark_gray>(fixed price)"
  hint-left-click: "<yellow>Left-click <gray>to buy 1"
  hint-shift-left-click: "<yellow>Shift-left-click <gray>to buy 64"
  hint-right-click: "<yellow>Right-click <gray>to sell 1"
  hint-shift-right-click: "<yellow>Shift-right-click <gray>to sell all in inventory"
