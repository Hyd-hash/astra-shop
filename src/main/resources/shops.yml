# =========================================================
#  AstraShop item catalogue.
#
#  categories:
#    <id>:
#      display-name: shown in the main menu (MiniMessage/legacy ok)
#      icon: material for the category button in the main menu
#      slot: fixed slot in the main menu (optional, auto-fills if omitted)
#      items:
#        <id>:
#          material: Bukkit Material enum name
#          display-name: optional custom name, defaults to material name
#          dynamic: true/false -> use the hybrid pricing engine or not
#          base-buy: base/fixed buy price (per single item)
#          # sell price is derived automatically as base-buy * sell-margin
#          # for dynamic items. For fixed items set base-sell explicitly.
#          base-sell: fixed sell price (only used when dynamic: false)
#          buyable: true/false -> can players buy this item at all
#          sellable: true/false -> can players sell this item at all
#          min-multiplier / max-multiplier: optional per-item override
#          step-per-unit: optional per-item override
# =========================================================

