name: AstraShop
version: '1.0.0'
main: net.astranetwork.astrashop.AstraShop
api-version: '1.21'
author: Astra Network
description: Branded GUI shop for Astra Network, powered by Vault.
website: https://astranetwork.example

depend: [Vault]
softdepend: [Essentials]

commands:
  shop:
    description: Open the Astra Shop GUI.
    usage: /shop
    aliases: [ashop]
  astrashop:
    description: Admin controls for AstraShop.
    usage: /astrashop <reload|save|setprice|resetprice|give>
    aliases: [ash, astrashopadmin]
    permission: astrashop.admin

permissions:
  astrashop.use:
    description: Allows opening and using the shop.
    default: true
  astrashop.admin:
    description: Allows managing AstraShop (reload, edit prices).
    default: op
  astrashop.bypasscooldown:
    description: Bypasses the transaction cooldown.
    default: op
