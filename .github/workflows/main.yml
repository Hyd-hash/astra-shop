name: Build

"on":
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build plugin
        run: mvn -B clean package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: AstraShop-jar
          path: target/*.jar
